<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Head (rounded square) -->
  <rect x="2" y="6" width="28" height="24" rx="6" fill="#a6c1d6"/>
  <rect x="2" y="6" width="28" height="24" rx="6" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8deec"/>
      <stop offset="100%" stop-color="#7ca4bd"/>
    </linearGradient>
  </defs>
  <!-- Antenna stick -->
  <rect x="15" y="0" width="2" height="8" rx="1" fill="#7ca4bd"/>
  <!-- Antenna ball -->
  <circle cx="16" cy="1.5" r="2.5" fill="#fffbc7"/>
  <!-- Left eye -->
  <circle cx="11" cy="16" r="5" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="11" cy="16" r="2.5" fill="#000d18"/>
  <!-- Right eye -->
  <circle cx="21" cy="16" r="5" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="21" cy="16" r="2.5" fill="#000d18"/>
  <!-- Mouth -->
  <rect x="7" y="23" width="18" height="5" rx="1.5" fill="#333" stroke="#555" stroke-width="0.8"/>
  <!-- Teeth lines -->
  <line x1="10.5" y1="23.5" x2="10.5" y2="27.5" stroke="#555" stroke-width="0.6"/>
  <line x1="14" y1="23.5" x2="14" y2="27.5" stroke="#555" stroke-width="0.6"/>
  <line x1="17.5" y1="23.5" x2="17.5" y2="27.5" stroke="#555" stroke-width="0.6"/>
  <line x1="21" y1="23.5" x2="21" y2="27.5" stroke="#555" stroke-width="0.6"/>
</svg>
